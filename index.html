                    .replace(/\bDouble\b/g,'雙').replace(/\btones?\b/gi,'聲調')
                    .replace(/\s{2,}/g,' ').trim();
                if (lang === 'zh') {
                    const m = tag.match(/[（(]([^）)]*[一-鿿＀-￯][^）)]*)[）)]/);
                    if (m) return toneZH(m[1]);
                    const ch = tag.match(/[一-鿿][一-鿿+\-\/\s]*/g);
                    if (ch && ch.length) return toneZH(ch.join(' '));

            // ── Pitch detection (autocorrelation) ──
            const detectPitchHz = (analyser, sampleRate) => {
                const fftSize = analyser.fftSize;
                const buf = new Float32Array(fftSize);
                analyser.getFloatTimeDomainData(buf);
                let rms = 0;
                for (let i = 0; i < fftSize; i++) rms += buf[i]*buf[i];
                rms = Math.sqrt(rms / fftSize);
                if (rms < 0.008) return -1;
                const minT = Math.round(sampleRate / 420);
                const maxT = Math.round(sampleRate / 65);
                let bestT = minT, bestC = -1;
                for (let t = minT; t <= Math.min(maxT, fftSize - 1); t++) {
                    let c = 0;
                    const len = fftSize - t;
                    for (let i = 0; i < len; i++) c += buf[i] * buf[i + t];
                    c /= len;
                    if (c > bestC) { bestC = c; bestT = t; }
                }
                if (bestC < 0.005) return -1;
                return sampleRate / bestT;
            };

                if (hz <= 0) return '';
                const notes = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
                const n = Math.round(12 * Math.log2(hz / 440)) + 57;
                if (n < 0) return '';
                const oct = Math.floor(n / 12);
                return notes[n % 12] + oct;

                const syls = (bopomofo || '').trim().split(/\s+/);
                const pts = [];
                syls.forEach((s, si) => {
                    const base = si / syls.length, span = 1 / syls.length;
                    const n = Math.max(5, Math.round(nPts / syls.length));
                    let tone = 1;
                    if (s.includes('ˋ')) tone = 4;
                    else if (s.includes('ˊ')) tone = 2;
                    else if (s.includes('ˇ')) tone = 3;
                    else if (s.includes('˙')) tone = 0;
                    for (let i = 0; i < n; i++) {
                        const p = i / (n - 1);
                        let hz;
                        if (tone === 1) hz = 195;
                        else if (tone === 2) hz = 130 + 80 * p;
                        else if (tone === 3) hz = p < 0.5 ? 160 - 60*(p*2) : 100 + 80*((p-0.5)*2);
                        else if (tone === 4) hz = 220 - 135 * p;
                        else hz = 125 + 15 * p; // neutral
                        pts.push({ t: base + span * p, hz });
                    }
                });

                    tag: 'Noun / Adjective (名詞/形容詞)',
                    tongueHint: '[捲舌送氣塞擦音+齒齦送氣塞音 ㄔㄨㄢˊ ㄊㄨㄥˇ] ㄔ: aspirated retroflex — curl back, strong puff. ㄊ: aspirated alveolar puff. Both aspirated with puff. 2nd + 3rd.',
                    hintZH: '[捲舌送氣塞擦音+齒齦送氣塞音 ㄔㄨㄢˊ ㄊㄨㄥˇ]\n（1）ㄔㄨㄢˊ：舌尖向後捲起，送氣捲舌塞擦；接著張開後，舌尖上升觸齒齦收鼻音。從中音穩步上升至高音。\n（2）ㄊㄨㄥˇ：舌尖頂住齒齦，送氣爆破；接著舌位偏後，舌根上升收軟顎鼻音。先從中音下降至最低，再上揚。',
                    tonguePath: ["M 80 85 Q 55 74 42 58 Q 34 46 37 40 Q 44 38 50 50 Q 65 74 80 85 Z", "M 80 85 Q 55 78 38 70 Q 28 65 30 60 Q 38 58 48 65 Q 65 78 80 85 Z"],
                    airflowPath: ["M 80 55 Q 60 52 45 42 Q 35 38 10 42", "M 80 50 Q 50 50 10 50"],
                    throatActive: false,
                    standardCurve: "M 10 70 C 35 55 65 35 80 25 M 87 42 C 95 60 100 80 105 85 C 110 78 113 55 115 38",
                    userCurve: "M 10 65 C 40 50 70 35 115 48"
                }
            ]);

            const currentData = vocabularyList[currentCardIndex] || vocabularyList[0];
            const totalCards = vocabularyList.length;

            React.useEffect(() => {
                let interval;
                const pathArray = currentData.tonguePath;
                if (Array.isArray(pathArray) && pathArray.length > 1) {
                    interval = setInterval(() => {
                        setFrameIndex(prev => (prev + 1) % pathArray.length);
                    }, 700);
                } else {
                    setFrameIndex(0);
                }
                return () => clearInterval(interval);
            }, [currentCardIndex, currentData]);

            // Request microphone permission on page load
            React.useEffect(() => {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                    .then(stream => {
                        // Permission granted — release the stream immediately (recording will re-acquire it)
                        stream.getTracks().forEach(t => t.stop());
                    })
                    .catch(() => {
                        // Permission denied or not available — recording button will show error when tapped
                    });
            }, []);

            React.useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.lang = 'zh-TW';
                    recognitionRef.current.interimResults = false;
                    recognitionRef.current.maxAlternatives = 1;
                    recognitionRef.current.onresult = (event) => {
                        setTranscript(event.results[0][0].transcript);
                    };
                    recognitionRef.current.onerror = (event) => {
                        if (event.error === 'no-speech') setTranscript('(No speech detected)');
                    };
                }
                return () => stopMediaTracks();
            }, []);

            const stopMediaTracks = () => {
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                if (audioContextRef.current && audioContextRef.current.state !== 'closed') audioContextRef.current.close();
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
                if (recognitionRef.current) recognitionRef.current.stop();
                if (pitchIntervalRef.current) clearInterval(pitchIntervalRef.current);
                if (audioCtxPitchRef.current && audioCtxPitchRef.current.state !== 'closed') {
                    try { audioCtxPitchRef.current.close(); } catch{}
                }
            };

            const startHoldRecording = async () => {
                shouldStopRef.current = false;
                setShowResult(false);
                setShowFeedbackModal(false);
                setRecordingState('recording');
                setTranscript('');
                pitchDataRef.current = [];
                setPitchPoints([]);
                const ref = genRefPitch(currentData.bopomofo);
                setRefPoints(ref);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    // If user released before mic was ready, abort cleanly
                    if (shouldStopRef.current || !isHoldingRef.current) {
                        stream.getTracks().forEach(t => t.stop()); // clean up mic
                        // Do NOT reset state — stopHoldRecording already set 'analyzing'
                        return;
                    }
                    streamRef.current = stream;
                    // Single AudioContext with TWO analysers (avoids browser multi-context issues)
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    audioContextRef.current = ac;
                    audioCtxPitchRef.current = ac;
                    const source = ac.createMediaStreamSource(stream);
                    // Waveform analyser
                    const analyser = ac.createAnalyser();
                    analyser.fftSize = 1024;
                    analyser.smoothingTimeConstant = 0.75;
                    analyserRef.current = analyser;
                    source.connect(analyser);
                    drawVisualizer();
                    // Pitch detection analyser
                    const analyserP = ac.createAnalyser();
                    analyserP.fftSize = 4096;
                    analyserPitchRef.current = analyserP;
                    source.connect(analyserP);
                    const sr = ac.sampleRate;
                    pitchIntervalRef.current = setInterval(() => {
                        if (!isHoldingRef.current || !analyserPitchRef.current) return;
                        const hz = detectPitchHz(analyserPitchRef.current, sr);
                        pitchDataRef.current.push({ t: Date.now(), hz: hz > 60 && hz < 600 ? hz : 0 });
                    }, 60);
                    if (recognitionRef.current) { try { recognitionRef.current.start(); } catch(e){} }
                } catch (err) {
                    setTranscript('(Microphone access denied)');
                    setRecordingState('error');
                    isHoldingRef.current = false;
                }
            };

            const stopHoldRecording = () => {
                isHoldingRef.current = false;
                shouldStopRef.current = true;
                clearInterval(pitchIntervalRef.current);
                stopMediaTracks();
                const rawPts = [...pitchDataRef.current];
                setPitchPoints(rawPts);
                setRecordingState('analyzing');
                setTimeout(async () => {
                    const userSpoke = transcript || '(No clear speech detected)';
                    if (apiKey && apiKey.trim() !== "") {
                        await generateAIFeedback(currentData.word, currentData.pinyin, userSpoke);
                    } else {
                        generateLocalFeedback(currentData.word, userSpoke);
                    }
                }, 1200);
            };

            // ── Simple click-toggle recording (replaces hold approach) ──
            const handleRecordClick = async () => {
                if (recordingState === 'recording') {
                    // STOP
                    clearInterval(pitchIntervalRef.current);
                    stopMediaTracks();
                    const rawPts = [...pitchDataRef.current];
                    setPitchPoints(rawPts);
                    setRecordingState('analyzing');
                    setTimeout(() => {

                            generateAIFeedback(currentData.word, currentData.pinyin, spk);
                        } else {
                            generateLocalFeedback(currentData.word, spk);
                        }
                    }, 800);
                    return;
                }
                if (recordingState !== 'idle' && recordingState !== 'completed' && recordingState !== 'error') return;
                // START
                setRecordingState('recording');
                setShowFeedbackModal(false);
                setShowResult(false);
                setTranscript('');
                pitchDataRef.current = [];
                setPitchPoints([]);
                setRefPoints(genRefPitch(currentData.bopomofo));
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    streamRef.current = stream;
                    const ac = new (window.AudioContext || window.webkitAudioContext)();
                    audioContextRef.current = ac;
                    audioCtxPitchRef.current = ac;
                    const analyserP = ac.createAnalyser();
                    analyserP.fftSize = 4096;
                    analyserPitchRef.current = analyserP;
                    ac.createMediaStreamSource(stream).connect(analyserP);
                    const sr = ac.sampleRate;
                    pitchIntervalRef.current = setInterval(() => {
                        if (!analyserPitchRef.current) return;
                        const hz = detectPitchHz(analyserPitchRef.current, sr);
                        if (hz > 60 && hz < 600) pitchDataRef.current.push({ t: Date.now(), hz });
                    }, 80);
                    if (recognitionRef.current) { try { recognitionRef.current.start(); } catch(e) {} }
                } catch(err) {
                    setRecordingState('error');
                    setTranscript(lang === 'en'
                        ? '⚠ Microphone denied — please allow mic access in your browser'
                        : '⚠ 麥克風未授權 — 請在瀏覽器允許麥克風存取');
                }
            };

            const handleRecordStart = (e) => {
                e.preventDefault();
                e.stopPropagation();
                // Capture pointer to receive events even when finger/cursor moves off button
                if (e.currentTarget && e.currentTarget.setPointerCapture && e.pointerId != null) {
                    try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_) {}
                }
                if (recordingState === 'recording' || recordingState === 'analyzing') return;
                isHoldingRef.current = true;
                shouldStopRef.current = false;
                recordHoldStartRef.current = Date.now();
                startHoldRecording();
            };

            const handleRecordEnd = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!isHoldingRef.current) return;
                stopHoldRecording();
            };

            const startRecording = async () => {
                setRecordingState('recording');
                setTranscript('');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    streamRef.current = stream;
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioContextRef.current = audioContext;
                    const analyser = audioContext.createAnalyser();
                    analyserRef.current = analyser;
                    analyser.fftSize = 64;

                    const source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);
                    drawVisualizer();

                    if (recognitionRef.current) {
                        try { recognitionRef.current.start(); } catch (e) {}
                    }
                } catch (err) {
                    setTranscript('(Microphone access denied)');
                    setRecordingState('error');
                }
            };

            const drawVisualizer = () => {
                if (!canvasRef.current || !analyserRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const bufferLength = analyserRef.current.fftSize;
                const dataArray = new Uint8Array(bufferLength);
                const draw = () => {
                    if (!analyserRef.current) return;
                    animationRef.current = requestAnimationFrame(draw);
                    analyserRef.current.getByteTimeDomainData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255,247,237,0.9)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#f43f5e';
                    ctx.lineWidth = 2.5;
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    const step = canvas.width / bufferLength;
                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = (v * canvas.height) / 2;
                        i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * step, y);
                    }
                    ctx.stroke();
                };
                draw();
            };

            const stopRecordingAndAnalyze = () => {

                    }

            // handleRecordClick replaced by handleRecordStart / handleRecordEnd

            const generateLocalFeedback = (targetWord, userSpoke) => {
                let feedback = "";
                const cleanSpoke = userSpoke.replace(/[^\u4e00-\u9fa5]/g, '');

                if (cleanSpoke.includes(targetWord)) {
                    feedback = "Perfect! Your pronunciation is highly accurate and recognized correctly by the system.";
                } else {
                    feedback = `System recognized: "${userSpoke}". `;

                        feedback += "Classic retroflex error! Curl your tongue tip BACKWARD toward the hard palate (yellow zone). The tongue should not touch — just get close enough to create friction.";
                    } else if (targetWord === '你好' && (cleanSpoke.includes('你') || cleanSpoke.includes('好'))) {
                        feedback += "Good try! Tone sandhi: 'nǐ' should shift to a 2nd tone (rising), and 'hǎo' must dip very low before slightly rising.";
                    } else if (targetWord === '知' && (cleanSpoke.includes('知') || cleanSpoke.includes('之') || cleanSpoke.includes('七') || cleanSpoke.includes('雞'))) {
                        feedback += "Watch the aspiration: ㄓ (zhī) is UN-aspirated — hold your hand in front of your mouth and feel almost no air puff. It should feel tighter and quieter than ㄔ (chī).";
                    } else if (targetWord === '我' && (cleanSpoke.includes('我') || cleanSpoke.includes('渦') || cleanSpoke.includes('喔'))) {

                    } else if (targetWord === '魚' && (cleanSpoke.includes('魚') || cleanSpoke.includes('於') || cleanSpoke.includes('余') || cleanSpoke.includes('衣'))) {
                        feedback += "ㄩ is the hardest vowel! Your tongue must stay HIGH and FORWARD (as if saying 'ee'), while your lips round tightly (as if saying 'oo'). Don't let the tongue slide backward!";
                    } else if (targetWord === '老師' && (cleanSpoke.includes('老') || cleanSpoke.includes('師') || cleanSpoke.includes('老師'))) {

                    } else if (targetWord === '再見' && (cleanSpoke.includes('再') || cleanSpoke.includes('見') || cleanSpoke.includes('再見'))) {

                        feedback += "Great effort! Break it down: ㄕ (curl back) → ㄨ (lips round) → ㄟ (lips spread forward). The 3rd tone dip must be very deep. Practice the three positions separately, then link them.";
                    } else if (targetWord === '對不起' && (cleanSpoke.includes('對') || cleanSpoke.includes('不') || cleanSpoke.includes('起') || cleanSpoke.includes('對不起'))) {
                        feedback += "Well tried! Note: 'ㄅㄨ˙' (bu) is NEUTRAL TONE — very light and fast. 'ㄉㄨㄟˋ' starts high and falls; 'ㄑㄧˇ' needs the tongue body arching high toward the palate with a dip-and-rise 3rd tone.";
                    } else if (targetWord === '早安' && (cleanSpoke.includes('早') || cleanSpoke.includes('安') || cleanSpoke.includes('早安'))) {
                        feedback += "Nice try! ㄗ uses a FLAT tongue near your lower front teeth — not curled. For 'ㄢ', your tongue tip must rise and TOUCH the alveolar ridge at the end to produce the final [n]. Don't leave it open!";
                    } else if (targetWord === '人' && (cleanSpoke.includes('人') || cleanSpoke.includes('仁') || cleanSpoke.includes('任') || cleanSpoke.includes('認'))) {
                        feedback += "ㄖ is the only voiced retroflex — feel the buzz in your throat while the tongue curls back. Don't forget the nasal ending ㄣ: tongue tip must rise to touch behind the upper teeth. Rise the 2nd tone all the way to the top!";
                    } else if (targetWord === '好吃' && (cleanSpoke.includes('好') || cleanSpoke.includes('吃') || cleanSpoke.includes('好吃'))) {
                        feedback += "Great pair to practice! ㄏ uses the BACK of your tongue near the soft palate; ㄔ uses the TIP curled to the hard palate. Your tongue journeys the full length of your mouth between them. Feel that contrast!";
                    } else if (targetWord === '爸' && (cleanSpoke.includes('爸') || cleanSpoke.includes('拔') || cleanSpoke.includes('八') || cleanSpoke.includes('吧'))) {
                        feedback += "Getting close! ㄅ is UN-aspirated — no air puff at all. Hold your hand in front and feel almost nothing. Also listen to the 4th tone: start HIGH and fall decisively all the way to the bottom.";
                    } else if (targetWord === '媽' && (cleanSpoke.includes('媽') || cleanSpoke.includes('麻') || cleanSpoke.includes('馬') || cleanSpoke.includes('罵'))) {
                        feedback += "Almost there! For ㄇ, keep the lips closed and let the sound come THROUGH YOUR NOSE. Feel the vibration on your nose bridge. The 1st tone should already be at full high pitch during the nasal hum.";
                    } else if (targetWord === '飛' && (cleanSpoke.includes('飛') || cleanSpoke.includes('非') || cleanSpoke.includes('費') || cleanSpoke.includes('廢'))) {
                        feedback += "Watch the ㄈ: upper teeth must rest on the INNER edge of the lower lip (labiodental), not the outer edge. Air squeezes through that narrow gap — very close to English 'f'. Then let ㄟ open forward.";
                    } else if (targetWord === '朋友' && (cleanSpoke.includes('朋') || cleanSpoke.includes('友') || cleanSpoke.includes('朋友'))) {
                        feedback += "Nice try! Key check: ㄆ should have a strong air burst (aspirated). Then make sure ㄥ ends with the tongue ROOT up (soft palate nasal [ŋ]), not the tip up (alveolar [n]). Feel the buzz go to the BACK of your nose.";
                    } else if (targetWord === '大' && (cleanSpoke.includes('大') || cleanSpoke.includes('打') || cleanSpoke.includes('答') || cleanSpoke.includes('達'))) {
                        feedback += "Close! ㄉ should feel very quiet — the tip releases with almost no air puff (no aspiration). The 4th tone needs to fall sharply and completely. Compare: hold your hand in front for ㄉ (no puff) vs ㄊ (strong puff).";
                    } else if (targetWord === '天' && (cleanSpoke.includes('天') || cleanSpoke.includes('添') || cleanSpoke.includes('田') || cleanSpoke.includes('甜'))) {

                                                {/* Labels */}
                                                <text x="219" y="108" fontSize="9" fill="#92400e" fontWeight="700">{t.hp}</text>
                                                <text x="242" y="163" fontSize="9" fill="#92400e" fontWeight="700">{t.sp}</text>
                                                <text x="87" y="219" fontSize="9" fill="#9f1239" fontWeight="700">{t.tg}</text>
                                                <text x="13" y="102" fontSize="9" fill="#9a3412" fontWeight="700">{t.lp}</text>
                                                <text x="237" y="219" fontSize="9" fill="#6b21a8" fontWeight="700">{t.vf}</text>
                                                <text x="62" y="76" fontSize="8" fill="#64748b">{t.tt}</text>
                                                {/* Active zone labels */}
                                                {z.alveolar  && <text x="38" y="80" fontSize="8" fill="#c2410c" fontWeight="800">{ZH?'齒齦':'ridge'}</text>}
                                                {z.palatal   && <text x="90" y="51" fontSize="8" fill="#c2410c" fontWeight="800">{ZH?'硬顎':'palatal'}</text>}
                                                {z.retroflex && <text x="148" y="46" fontSize="8" fill="#c2410c" fontWeight="800">{ZH?'捲舌':'retro.'}</text>}
                                                {z.velar     && <text x="215" y="106" fontSize="8" fill="#c2410c" fontWeight="800">{ZH?'軟顎':'velar'}</text>}
                                                {z.bilabial  && <text x="10" y="125" fontSize="8" fill="#c2410c" fontWeight="800">{ZH?'雙唇':'bilabial'}</text>}
                                            </svg>
                                        </div>
                                        {/* Key articulation points */}
                                        <div className="space-y-2">
                                            {pts.map((pt, i) => (
                                                <div key={i} className="bg-white border border-slate-100 rounded-xl px-3 py-2 text-sm font-bold text-slate-700 shadow-sm">{pt}</div>
                                            ))}
                                        </div>
                                        {/* Detailed hint */}
                                        <div className="bg-indigo-50 rounded-2xl p-4 border border-indigo-100">
                                            <p className="text-xs font-black text-indigo-500 mb-1">
                                                {ZH ? '📖 詳細發音指引' : '📖 Detailed Articulation Guide'}
                                            </p>
                                            <p className="text-slate-600 text-xs leading-relaxed" style={{whiteSpace:'pre-line'}}>{formatHintText(lang === 'en' ? currentData.tongueHint : (currentData.hintZH || currentData.hintZH || toZH(currentData.tongueHint)))}</p>
                                        </div>
                                    </div>
                                    <div className="p-4 shrink-0 border-t border-slate-100">
                                        <button onClick={() => setShowAnatomy(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-bold cursor-pointer transition-colors">
                                            {ZH ? '關閉' : 'Close'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* ── Favorites Table Modal (filtered, favorites-only) ── */}
                    {showFavTable && (() => {
                        const favSorted = [...favorites].sort((a,b) => a-b);
                        return (
                            <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[60] flex items-center justify-center p-4"
                                onClick={e => e.target === e.currentTarget && setShowFavTable(false)}>
                                <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden border flex flex-col" style={{maxHeight:'85vh'}}>
                                    <div className="bg-gradient-to-r from-rose-500 to-pink-600 p-5 text-white flex items-center justify-between shrink-0">
                                        <h3 className="text-base font-black">♥ {t.collectedLabel} ({favorites.size})</h3>
                                        <button onClick={() => setShowFavTable(false)} className="text-white/80 hover:text-white text-2xl leading-none cursor-pointer">×</button>
                                    </div>
                                    <div className="overflow-y-auto flex-1">
                                        <table className="w-full text-sm">
                                            <thead className="sticky top-0 bg-slate-50 border-b border-slate-200 z-10">
                                                <tr>
                                                    <th className="px-3 py-2 text-left text-xs font-black text-slate-400 w-10">#</th>
                                                    <th className="px-3 py-2 text-left text-xs font-black text-slate-400">{lang==='en'?'Word':'單詞'}</th>
                                                    <th className="px-3 py-2 text-left text-xs font-black text-slate-400">{lang==='en'?'Meaning':'意思'}</th>
                                                    <th className="px-3 py-2 w-12"></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {favSorted.map((idx, pos) => {
                                                    const card = vocabularyList[idx];
                                                    if (!card) return null;
                                                    return (
                                                        <tr key={idx}
                                                            className={`border-b border-slate-100 transition-all duration-150 cursor-pointer hover:bg-rose-50 hover:scale-[1.01] ${currentCardIndex===idx?'bg-orange-50':''}`}
                                                            onClick={() => { setCurrentCardIndex(idx); resetPractice(); setShowFavTable(false); setShowFavorites(false); }}>
                                                            <td className="px-3 py-2.5 text-xs text-slate-400 font-mono">{pos+1}</td>
                                                            <td className="px-3 py-2.5">
                                                                <span className="font-black text-slate-800 text-base mr-2">{card.word}</span>
                                                                <span className="text-xs text-slate-400 font-mono">{card.pinyin}</span>
                                                            </td>
                                                            <td className="px-3 py-2.5 text-slate-500 text-xs">{MEANINGS[card.word] || '—'}</td>
                                                            <td className="px-3 py-2.5 text-center">
                                                                {currentCardIndex===idx
                                                                    ? <span className="text-[10px] font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full">▶</span>
                                                                    : <span className="text-[10px] text-slate-300">{t.jumpBtn}</span>}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* ── Feedback Modal ── */}
                    {showFeedbackModal && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setShowFeedbackModal(false)}>
                            <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden border flex flex-col" style={{maxHeight:'92vh'}} onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-emerald-500 to-teal-600 p-4 text-white flex items-center justify-between shrink-0">
                                    <div className="flex items-center gap-3">
                                        <span className="text-3xl font-black">{currentData.word}</span>
                                        <div>
                                            <div className="text-sm font-bold">{MEANINGS[currentData.word] || ''}</div>
                                            <div className="text-xs opacity-80">{currentData.pinyin} · {currentData.bopomofo}</div>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowFeedbackModal(false)} className="text-white/80 hover:text-white text-3xl leading-none cursor-pointer">×</button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-4 space-y-4">
                                    {/* Chromatic pitch canvas */}
                                    {pitchPoints.length > 0 && (
                                        <div>
                                            <p className="text-[11px] font-black text-slate-400 flex items-center gap-2 mb-1">
                                                <Icons.AudioWaveform /> {t.pitchTrackTitle}
                                                <span className="text-emerald-500">— {t.refPitch}</span>
                                                <span className="text-amber-400">▌ {t.yourPitch}</span>
                                            </p>
                                            <canvas ref={pitchCanvasRef} width="500" height="200" className="w-full rounded-xl bg-gray-900"></canvas>
                                        </div>
                                    )}
                                    {/* Tone contour comparison */}
                                    <div className="bg-slate-50 rounded-2xl p-4 border">
                                        <h4 className="text-xs font-black text-slate-500 mb-2 flex items-center gap-2">
                                            <Icons.AudioWaveform /> {t.pitchTitle}
                                            <span className="text-indigo-500">— {lang==='en'?'Standard':'標準'}</span>
                                            <span className="text-rose-400">- - {lang==='en'?'Typical error':'常見問題'}</span>
                                        </h4>
                                        <div className="h-20 w-full bg-white border-l border-b border-slate-200">
                                            <svg viewBox="0 0 120 100" className="w-full h-full overflow-visible">
                                                <path d={currentData.standardCurve} fill="transparent" stroke="#6366f1" strokeWidth="3" strokeLinecap="round" />
                                                <path d={currentData.userCurve} fill="transparent" stroke="#f43f5e" strokeWidth="3" strokeDasharray="5 3" strokeLinecap="round" />
                                            </svg>
                                        </div>
                                    </div>
                                    {/* Text feedback */}
                                    <div className="bg-amber-50 border border-amber-100 rounded-2xl p-4">
                                        <h5 className="text-xs font-black text-amber-600 mb-2">{t.fbLabel}</h5>
                                        <p className="text-slate-700 font-bold text-sm leading-relaxed">{lang === 'en' ? aiFeedback : aiFeedbackZH}</p>
                                    </div>
                                </div>
                                <div className="p-4 shrink-0 border-t border-slate-100 flex gap-2 flex-wrap">
                                    <button onClick={() => {
                                        if ('speechSynthesis' in window) {
                                            window.speechSynthesis.cancel();
                                            const u = new SpeechSynthesisUtterance(currentData.word);
                                            u.lang = 'zh-TW'; u.rate = 0.75; u.pitch = 1;
                                            window.speechSynthesis.speak(u);
                                        }
                                    }} className="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl text-sm font-bold cursor-pointer">
                                        {lang === 'en' ? '🔊 Standard Audio' : '🔊 聽標準音'}
                                    </button>
                                    <button onClick={() => { setShowFeedbackModal(false); handleRecordClick(); }} className="flex-1 bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl text-sm font-bold cursor-pointer">
                                        {lang === 'en' ? '🎙 Record Again' : '🎙 再錄一次'}
                                    </button>
                                    <button onClick={() => setShowFeedbackModal(false)} className="w-full border-2 border-slate-200 text-slate-600 hover:bg-slate-50 py-2.5 rounded-xl text-sm font-bold cursor-pointer">
                                        {lang==='en'?'Close':'關閉'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Card Table Modal ── */}
                    {showCardTable && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                            onClick={e => e.target === e.currentTarget && setShowCardTable(false)}>
                            <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden border flex flex-col" style={{maxHeight:'85vh'}}>
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 p-5 text-white flex items-center justify-between shrink-0">
                                    <h3 className="text-base font-black">📋 {t.tableTitle} ({totalCards})</h3>
                                    <button onClick={() => setShowCardTable(false)} className="text-white/80 hover:text-white text-2xl leading-none cursor-pointer">×</button>
                                </div>
                                <div className="overflow-y-auto flex-1">
                                    <table className="w-full text-sm">
                                        <thead className="sticky top-0 bg-slate-50 border-b border-slate-200 z-10">
                                            <tr>
                                                <th className="px-3 py-2 text-left text-xs font-black text-slate-400 w-10">#</th>
                                                <th className="px-3 py-2 text-left text-xs font-black text-slate-400">Word</th>
                                                <th className="px-3 py-2 text-left text-xs font-black text-slate-400">Meaning</th>
                                                <th className="px-3 py-2 w-12"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {vocabularyList.map((card, idx) => (
                                                <tr key={idx}
                                                    className={`border-b border-slate-100 transition-all duration-150 cursor-pointer hover:bg-indigo-50 hover:scale-[1.01] ${currentCardIndex===idx ? 'bg-orange-50' : ''}`}
                                                    onClick={() => { setCurrentCardIndex(idx); resetPractice(); setShowCardTable(false); }}>
                                                    <td className="px-3 py-2.5 text-xs text-slate-400 font-mono">{idx+1}</td>
                                                    <td className="px-3 py-2.5">
                                                        <span className="font-black text-slate-800 text-base mr-2">{card.word}</span>
                                                        <span className="text-xs text-slate-400 font-mono">{card.pinyin}</span>
                                                    </td>
                                                    <td className="px-3 py-2.5 text-slate-500 text-xs">{MEANINGS[card.word] || '—'}</td>
                                                    <td className="px-3 py-2.5 text-center">
                                                        {currentCardIndex === idx
                                                            ? <span className="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">▶</span>
                                                            : <span className="text-[10px] text-slate-300">{t.jumpBtn}</span>}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Favorites Modal ── */}
                    {showFavorites && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
                            onClick={e => e.target === e.currentTarget && setShowFavorites(false)}>
                            <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden border flex flex-col" style={{maxHeight:'85vh'}}>
                                <div className="bg-gradient-to-r from-rose-500 to-pink-600 p-4 text-white flex items-center justify-between shrink-0">
                                    <h3 className="text-base font-black">♥ {t.collectedLabel} ({favorites.size})</h3>
                                    <div className="flex gap-2 items-center">
                                        {favorites.size > 0
                                            ? <button onClick={() => setShowFavTable(true)} className="text-xs font-black bg-white/20 hover:bg-white/30 px-2 py-1 rounded-lg cursor-pointer">
                                                📋 {favPositionInSet >= 0 ? `${favPositionInSet + 1} / ${favorites.size}` : `— / ${favorites.size}`}
                                              </button>
                                            : <span className="text-xs font-black bg-white/10 opacity-50 px-2 py-1 rounded-lg cursor-not-allowed">📋 0 / 0</span>
                                        }
                                        <button onClick={() => setShowFavorites(false)} className="text-white/80 hover:text-white text-2xl leading-none cursor-pointer ml-1">×</button>
                                    </div>
                                </div>
                                <div className="overflow-y-auto flex-1 p-4">
                                    {favorites.size === 0
                                        ? <p className="text-slate-400 text-center py-16 font-bold">{t.favEmpty}</p>
                                        : <div className="grid grid-cols-2 gap-3">
                                            {[...favorites].sort((a,b) => a-b).map(idx => {
                                                const card = vocabularyList[idx];
                                                if (!card) return null;
                                                return (
                                                    <div key={idx}
                                                        className="bg-orange-50 border border-orange-100 rounded-2xl p-4 flex flex-col items-center gap-1 relative cursor-pointer hover:scale-[1.04] transition-transform shadow-sm"
                                                        onClick={() => { setCurrentCardIndex(idx); resetPractice(); setShowFavorites(false); }}>
                                                        <button onClick={e => { e.stopPropagation(); toggleFavorite(idx); }}
                                                            className="absolute top-2 right-2 text-rose-400 hover:text-rose-600 text-lg cursor-pointer leading-none">♥</button>
                                                        <span className="text-4xl font-black text-slate-800">{card.word}</span>
                                                        <span className="text-xs text-slate-500 font-semibold">{MEANINGS[card.word] || '—'}</span>
                                                        <span className="text-xs text-indigo-500 font-mono">{card.pinyin}</span>
                                                        <span className="text-[10px] text-slate-400 font-bold">#{idx+1}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    }
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 原本的新增卡片 Modal (保持不變) */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
